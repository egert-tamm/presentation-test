const SlideView=({slide,index,total})=>{
  if(!slide)return null;
  const p={s:slide,i:index,n:total};
  switch(slide.type){
    case"cover":return<CoverSlide {...p}/>;
    case"stats_sidebar":return<StatsSidebarSlide {...p}/>;
    case"grid_cards":return<GridCardsSlide {...p}/>;
    case"chapter":return<ChapterSlide {...p}/>;
    case"team":return<TeamSlide {...p}/>;
    case"portfolio":return<PortfolioSlide {...p}/>;
    case"advantage":return<AdvantageSlide {...p}/>;
    case"cta":return<CTASlide {...p}/>;
    case"quote":return<QuoteSlide {...p}/>;
    default:return<ChapterSlide {...p}/>;
  }
};

const SYSTEM=`You are a slide deck content generator for Yolo Investments — a fintech/crypto/gaming VC fund.
Brand: orange #ff6200, light grey #f0f0f0, black. Fonts: Space Grotesk (headings), DM Sans (body).
Return ONLY a valid raw JSON array — no markdown, no fences, no prose.

Slide types:
cover: { type:"cover", title:"multi-line\nheading", subtitle:"orange tagline", tags:"Tag · Tag" }
stats_sidebar: { type:"stats_sidebar", headline:"Black||orange||black.", body1:"para", body2:"para", stats:[{value:"$2.4B",label:"desc"},{value:"47%",label:"desc"},{value:"12x",label:"desc"}] }
grid_cards: { type:"grid_cards", headline:"Black||orange||black.", subtext:"subtitle", cards:[{title:"Card||Title",body:"desc"},{...},{...},{...}] }
chapter: { type:"chapter", title:"Section heading", subtitle:"italic subtitle" }
team: { type:"team", title:"Team headline", subtitle:"subtitle", people:[{name:"...",role:"...",bio:"..."},{...},{...}] }
portfolio: { type:"portfolio", title:"Portfolio heading", subtitle:"subtitle", companies:[{name:"...",desc:"...",tag:"optional"}, ...8 max] }
advantage: { type:"advantage", title:"Heading", subtitle:"subtitle", left:[{name:"...",desc:"..."},{...},{...}], right:[{name:"...",desc:"..."},{...},{...}], body:"footnote" }
cta: { type:"cta", headline:"Big\nclosing line", body:"copy", cta:"Button text" }
quote: { type:"quote", quote:"Statement||orange part||more black", attribution:"optional" }

Generate 8 slides. Variety of layouts. Specific, bold, professional. No placeholders. Use || for orange highlights.`;

function App(){
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("yolo_api_key")||"");
  const[keyInput,setKeyInput]=useState("");
  const[keySet,setKeySet]=useState(()=>!!localStorage.getItem("yolo_api_key"));
  const[topic,setTopic]=useState("");
  const[slides,setSlides]=useState([]);
  const[current,setCurrent]=useState(0);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  const saveKey=()=>{if(!keyInput.trim())return;localStorage.setItem("yolo_api_key",keyInput.trim());setApiKey(keyInput.trim());setKeySet(true);setKeyInput("");};
  const clearKey=()=>{localStorage.removeItem("yolo_api_key");setApiKey("");setKeySet(false);};

  const generate=async()=>{
    if(!topic.trim()||!apiKey)return;
    setLoading(true);setErr("");setSlides([]);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:SYSTEM,messages:[{role:"user",content:`Generate a Yolo Investments deck about: "${topic}"`}]})});
      if(!res.ok)throw new Error("API "+res.status);
      const data=await res.json();
      const raw=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const m=raw.match(/\[[\s\S]*\]/);
      if(!m)throw new Error("No JSON found");
      setSlides(JSON.parse(m[0]));setCurrent(0);
    }catch(e){setErr(e.message);}finally{setLo
